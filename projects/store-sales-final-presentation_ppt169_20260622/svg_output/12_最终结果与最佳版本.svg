<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#163B66"/>
      <stop offset="100%" stop-color="#2F80ED"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#F7F8FA"/>
  <g id="header">
    <rect x="56" y="54" width="4" height="56" rx="2" fill="#163B66"/>
    <text x="78" y="88" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="34" font-weight="800" fill="#1F2937">
      <tspan>最终结果与最佳版本</tspan>
    </text>
    <text x="78" y="116" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="700" fill="#6B7280" letter-spacing="1.4">
      <tspan>BEST PUBLIC SCORE · LEADERBOARD POSITION · VERSION7.3</tspan>
    </text>
  </g>
  <g id="left-score">
    <text x="120" y="246" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="132" font-weight="800" fill="url(#scoreGrad)">
      <tspan>0.38005</tspan>
    </text>
    <text x="124" y="284" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" font-weight="700" fill="#6B7280" letter-spacing="1.8">
      <tspan>VERSION7.3 · BEST PUBLIC SCORE</tspan>
    </text>
    <g id="rank-card">
      <rect x="100" y="330" width="332" height="146" rx="18" fill="#FFFFFF"/>
      <text x="130" y="376" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" fill="#163B66">
        <tspan>Kaggle 排名表现</tspan>
      </text>
      <text x="130" y="434" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="74" font-weight="800" fill="#163B66">
        <tspan>108</tspan>
      </text>
      <text x="292" y="418" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">
        <tspan>/ 1238</tspan>
      </text>
      <text x="130" y="458" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#6B7280">
        <tspan>进入前 </tspan><tspan fill="#2F80ED" font-weight="800">8.7%</tspan><tspan> 左右</tspan>
      </text>
    </g>
    <g id="explanation">
      <text x="102" y="540" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#1F2937">
        <tspan x="102" dy="0">最佳版本是 </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">version7.3</tspan><tspan>，在主线集成</tspan>
        <tspan x="102" dy="30">结构不变的情况下，保留 </tspan><tspan fill="#2F80ED" font-weight="800">4 个核心节假日</tspan><tspan> 后</tspan>
        <tspan x="102" dy="30">取得当前最优公开榜成绩。</tspan>
      </text>
      <text x="102" y="646" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#6B7280">
        <tspan>截图中的 best entry 为 0.38041，随后版本继续优化到 0.38005。</tspan>
      </text>
    </g>
  </g>
  <g id="right-proof">
    <rect x="500" y="156" width="724" height="470" rx="18" fill="#FFFFFF"/>
    <text x="532" y="196" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="800" fill="#163B66">
      <tspan>排行榜截图证明</tspan>
    </text>
    <image href="../images/leaderboard_rank.png" x="532" y="218" width="660" height="372" preserveAspectRatio="xMidYMid slice"/>
    <rect x="532" y="540" width="660" height="50" fill="#FFFFFF" fill-opacity="0.92"/>
    <text x="556" y="572" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#1F2937">
      <tspan>截图显示项目账号排名约为 </tspan><tspan fill="#163B66" font-weight="800">108 / 1238</tspan><tspan>，对应页面 best entry 为 </tspan><tspan fill="#163B66" font-weight="800">0.38041</tspan><tspan>。</tspan>
    </text>
  </g>
  <g id="footer">
    <text x="1218" y="682" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="13" fill="#9CA3AF" text-anchor="end">
      <tspan>12</tspan>
    </text>
  </g>
</svg>
