<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#F7F8FA"/>
  <g id="header">
    <rect x="56" y="54" width="4" height="56" rx="2" fill="#163B66"/>
    <text x="78" y="88" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="34" font-weight="800" fill="#1F2937">
      <tspan>项目中的主流技术栈</tspan>
    </text>
    <text x="78" y="116" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="700" fill="#6B7280" letter-spacing="1.4">
      <tspan>PYTHON · PANDAS / NUMPY · LIGHTGBM / XGBOOST · DARTS / SCIKIT-LEARN</tspan>
    </text>
  </g>
  <g id="card-python">
    <rect x="56" y="170" width="274" height="212" rx="14" fill="#FFFFFF"/>
    <use data-icon="tabler-outline/code" x="84" y="198" width="28" height="28" fill="#2F80ED" stroke-width="2"/>
    <text x="126" y="220" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="20" font-weight="800" fill="#1F2937">
      <tspan>Python</tspan>
    </text>
    <text x="84" y="264" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#1F2937">
      <tspan x="84" dy="0">整体实验与建模语言，负责</tspan>
      <tspan x="84" dy="24">数据处理、训练、预测、</tspan>
      <tspan x="84" dy="24">提交导出与版本迭代。</tspan>
    </text>
  </g>
  <g id="card-data">
    <rect x="348" y="170" width="274" height="212" rx="14" fill="#FFFFFF"/>
    <use data-icon="tabler-outline/database" x="376" y="198" width="28" height="28" fill="#2F80ED" stroke-width="2"/>
    <text x="418" y="220" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="20" font-weight="800" fill="#1F2937">
      <tspan>pandas / numpy</tspan>
    </text>
    <text x="376" y="264" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#1F2937">
      <tspan x="376" dy="0">负责表格清洗、时间字段转换、</tspan>
      <tspan x="376" dy="24">缺失值补齐、插值、分组聚合</tspan>
      <tspan x="376" dy="24">以及基础数值运算。</tspan>
    </text>
  </g>
  <g id="card-models">
    <rect x="640" y="170" width="274" height="212" rx="14" fill="#FFFFFF"/>
    <use data-icon="tabler-outline/cpu" x="668" y="198" width="28" height="28" fill="#2F80ED" stroke-width="2"/>
    <text x="710" y="220" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="20" font-weight="800" fill="#1F2937">
      <tspan>LightGBM / XGBoost</tspan>
    </text>
    <text x="668" y="264" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#1F2937">
      <tspan x="668" dy="0">作为主力树模型，负责处理</tspan>
      <tspan x="668" dy="24">lag 特征、非线性关系和</tspan>
      <tspan x="668" dy="24">最终多分支融合。</tspan>
    </text>
  </g>
  <g id="card-ts">
    <rect x="932" y="170" width="292" height="212" rx="14" fill="#FFFFFF"/>
    <use data-icon="tabler-outline/stack-2" x="960" y="198" width="28" height="28" fill="#2F80ED" stroke-width="2"/>
    <text x="1002" y="220" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="20" font-weight="800" fill="#1F2937">
      <tspan>Darts / scikit-learn</tspan>
    </text>
    <text x="960" y="264" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#1F2937">
      <tspan x="960" dy="0">统一多序列时间序列接口，</tspan>
      <tspan x="960" dy="24">并负责编码、缩放、流水线与</tspan>
      <tspan x="960" dy="24">协变量管理。</tspan>
    </text>
  </g>
  <g id="bottom-summary">
    <rect x="56" y="426" width="1168" height="162" rx="14" fill="#FFFFFF"/>
    <text x="88" y="468" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="800" fill="#163B66">
      <tspan>为什么说这些是“主流技术”？</tspan>
    </text>
    <text x="88" y="510" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#1F2937">
      <tspan x="88" dy="0">因为在表格型时间序列竞赛和实际业务预测任务里，常见路线通常就是：</tspan>
      <tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">Python</tspan>
      <tspan> 负责实验环境，</tspan>
      <tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">pandas / numpy</tspan>
      <tspan> 负责数据处理，</tspan>
      <tspan x="88" dy="28"><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">LightGBM / XGBoost</tspan><tspan> 负责强表格基线，</tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">Darts</tspan><tspan> 负责更结构化的时间序列接口。</tspan></tspan>
      <tspan x="88" dy="28">这使得课程作业的技术选择，与主流竞赛和工程实践之间是连贯的，而不是脱节的。</tspan>
    </text>
  </g>
  <g id="footer">
    <text x="1218" y="656" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="13" fill="#9CA3AF" text-anchor="end">
      <tspan>07</tspan>
    </text>
  </g>
</svg>
