<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#F7F8FA"/>
  <g id="header">
    <rect x="56" y="54" width="4" height="56" rx="2" fill="#163B66"/>
    <text x="78" y="88" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="34" font-weight="800" fill="#1F2937">
      <tspan>这些技术在项目里的具体用法</tspan>
    </text>
    <text x="78" y="116" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="700" fill="#6B7280" letter-spacing="1.4">
      <tspan>FROM FUNCTIONS TO MODULES · HOW THE STACK MAPS TO THE CODEBASE</tspan>
    </text>
  </g>
  <g id="top-map">
    <rect x="56" y="168" width="1168" height="118" rx="14" fill="#FFFFFF"/>
    <text x="88" y="208" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="800" fill="#163B66">
      <tspan>代码模块映射</tspan>
    </text>
    <text x="88" y="248" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="17" fill="#1F2937">
      <tspan>version6/darts_ensemble.py</tspan><tspan font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif"> 负责主线 Darts 集成、协变量组织与训练器封装</tspan>
    </text>
    <text x="88" y="274" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="17" fill="#1F2937">
      <tspan>version5/lgbm_recursive.py</tspan><tspan font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif"> 负责无泄漏递推 LightGBM 方案与逐日预测逻辑</tspan>
    </text>
  </g>
  <g id="use-1">
    <rect x="56" y="320" width="564" height="292" rx="14" fill="#FFFFFF"/>
    <use data-icon="tabler-outline/schema" x="84" y="346" width="26" height="26" fill="#2F80ED" stroke-width="2"/>
    <text x="122" y="366" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="19" font-weight="800" fill="#1F2937">
      <tspan>pandas / numpy 在哪里用？</tspan>
    </text>
    <text x="84" y="412" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#1F2937">
      <tspan x="84" dy="0">• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">preprocess_train</tspan><tspan>：补齐缺失日期与面板组合</tspan>
      <tspan x="84" dy="28">• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">preprocess_oil</tspan><tspan>：油价全日期补齐与插值</tspan>
      <tspan x="84" dy="28">• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">preprocess_transactions</tspan><tspan>：交易量按门店插值</tspan>
      <tspan x="84" dy="28">• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">merge_all_data</tspan><tspan>：多表合并、时间字段和索引构造</tspan>
    </text>
  </g>
  <g id="use-2">
    <rect x="660" y="320" width="564" height="292" rx="14" fill="#FFFFFF"/>
    <use data-icon="tabler-outline/device-laptop" x="688" y="346" width="26" height="26" fill="#2F80ED" stroke-width="2"/>
    <text x="726" y="366" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="19" font-weight="800" fill="#1F2937">
      <tspan>模型和时间序列技术怎么落地？</tspan>
    </text>
    <text x="688" y="412" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#1F2937">
      <tspan x="688" dy="0">• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">LightGBM</tspan><tspan>：在 version5 里做递推预测，在 version6+ 里做 Darts 分支</tspan>
      <tspan x="688" dy="28">• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">XGBoost</tspan><tspan>：作为并行分支参与多组 lag 集成与最终融合</tspan>
      <tspan x="688" dy="28">• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">Darts</tspan><tspan>：在 get_target_series、get_covariates、Trainer 中组织主线骨架</tspan>
      <tspan x="688" dy="28">• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">scikit-learn</tspan><tspan>：负责编码和静态协变量转换等通用预处理</tspan>
    </text>
  </g>
  <g id="footer">
    <text x="1218" y="656" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="13" fill="#9CA3AF" text-anchor="end">
      <tspan>09</tspan>
    </text>
  </g>
</svg>
