<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#F7F8FA"/>
  <g id="header">
    <rect x="56" y="54" width="4" height="56" rx="2" fill="#163B66"/>
    <text x="78" y="88" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="34" font-weight="800" fill="#1F2937">
      <tspan>项目难点与解决策略</tspan>
    </text>
    <text x="78" y="116" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="700" fill="#6B7280" letter-spacing="1.4">
      <tspan>ALIGNMENT · VALIDATION · FEATURE NOISE · PIPELINE ORGANIZATION</tspan>
    </text>
  </g>
  <g id="left-problems">
    <rect x="56" y="170" width="522" height="448" rx="14" fill="#FFFFFF"/>
    <text x="88" y="212" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="800" fill="#163B66">
      <tspan>项目难点</tspan>
    </text>
    <text x="88" y="264" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#1F2937">
      <tspan x="88" dy="0">1. 多张表、不同粒度、不同日期范围</tspan>
      <tspan x="88" dy="26">放在一起之后，数据很容易错位。</tspan>
      <tspan x="88" dy="42">2. 树模型做多步预测时，线下验证</tspan>
      <tspan x="88" dy="26">很容易不小心看到未来信息。</tspan>
      <tspan x="88" dy="42">3. 特征和协变量很多，但不代表</tspan>
      <tspan x="88" dy="26">全部都有效，甚至可能引入噪声。</tspan>
      <tspan x="88" dy="42">4. 主线方案进入多序列、多模型、多协变量后，</tspan>
      <tspan x="88" dy="26">代码组织和实验管理复杂度明显上升。</tspan>
    </text>
  </g>
  <g id="right-solutions">
    <rect x="642" y="170" width="582" height="448" rx="14" fill="#FFFFFF"/>
    <use data-icon="tabler-outline/settings-2" x="670" y="198" width="28" height="28" fill="#2F80ED" stroke-width="2"/>
    <text x="712" y="220" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="800" fill="#163B66">
      <tspan>对应解决策略</tspan>
    </text>
    <text x="670" y="270" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#1F2937">
      <tspan x="670" dy="0">• 先用统一面板补齐策略，把</tspan>
      <tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">train / oil / transactions / holidays</tspan>
      <tspan x="670" dy="24">逐步对齐到同一时间轴和同一业务粒度上。</tspan>
    </text>
    <line x1="670" y1="314" x2="1192" y2="314" stroke="#E6ECF2" stroke-width="1"/>
    <text x="670" y="358" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#1F2937">
      <tspan x="670" dy="0">• 在</tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">version5</tspan><tspan> 里改成逐日递推预测，</tspan>
      <tspan x="670" dy="24">确保未来特征只能依赖历史和前一步预测值。</tspan>
    </text>
    <line x1="670" y1="402" x2="1192" y2="402" stroke="#E6ECF2" stroke-width="1"/>
    <text x="670" y="446" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#1F2937">
      <tspan x="670" dy="0">• 用单因子实验逐个测试</tspan>
      <tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">lags</tspan><tspan>、</tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">holidays</tspan><tspan>、</tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">transactions</tspan>
      <tspan x="670" dy="24">的边际贡献，避免凭感觉加特征。</tspan>
    </text>
    <line x1="670" y1="490" x2="1192" y2="490" stroke="#E6ECF2" stroke-width="1"/>
    <text x="670" y="534" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#1F2937">
      <tspan x="670" dy="0">• 在</tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">Darts + Trainer</tspan><tspan> 框架下统一多序列和协变量接口，</tspan>
      <tspan x="670" dy="24">并通过版本目录保留每次改动和提交结果。</tspan>
    </text>
  </g>
  <g id="footer">
    <text x="1218" y="656" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="13" fill="#9CA3AF" text-anchor="end">
      <tspan>10</tspan>
    </text>
  </g>
</svg>
