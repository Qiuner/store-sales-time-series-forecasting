    <text x="122" y="366" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="19" font-weight="800" fill="#1F2937">
      <tspan>pandas / numpy 在哪里用？</tspan>
    </text>
    <text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="17" x="84" y="412"><tspan>• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">preprocess_train</tspan><tspan>：补齐缺失日期与面板组合</tspan>
      </text><text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="17" x="84" y="440"><tspan>• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">preprocess_oil</tspan><tspan>：油价全日期补齐与插值</tspan>
      </text><text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="17" x="84" y="468"><tspan>• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">preprocess_transactions</tspan><tspan>：交易量按门店插值</tspan>
      </text><text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="17" x="84" y="496"><tspan>• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">merge_all_data</tspan><tspan>：多表合并、时间字段和索引构造</tspan>
    </text></g>
