    <text x="726" y="366" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="19" font-weight="800" fill="#1F2937">
      <tspan>模型和时间序列技术怎么落地？</tspan>
    </text>
    <text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="17" x="688" y="412"><tspan>• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">LightGBM</tspan><tspan>：在 version5 里做递推预测，在 version6+ 里做 Darts 分支</tspan>
      </text><text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="17" x="688" y="440"><tspan>• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">XGBoost</tspan><tspan>：作为并行分支参与多组 lag 集成与最终融合</tspan>
      </text><text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="17" x="688" y="468"><tspan>• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">Darts</tspan><tspan>：在 get_target_series、get_covariates、Trainer 中组织主线骨架</tspan>
      </text><text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="17" x="688" y="496"><tspan>• </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">scikit-learn</tspan><tspan>：负责编码和静态协变量转换等通用预处理</tspan>
    </text></g>
