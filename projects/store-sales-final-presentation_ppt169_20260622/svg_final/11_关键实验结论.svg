<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#F7F8FA" />
  <g id="header">
    <path fill="#163B66" d="M58,54 H58 A2,2 0 0 1 60,56 V108 A2,2 0 0 1 58,110 H58 A2,2 0 0 1 56,108 V56 A2,2 0 0 1 58,54 Z" />
    <text x="78" y="88" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="34" font-weight="800" fill="#1F2937">
      <tspan>关键实验结论</tspan>
    </text>
    <text x="78" y="116" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="700" fill="#6B7280" letter-spacing="1.4">
      <tspan>ONLY A FEW FACTORS PRODUCED STABLE SCORE IMPROVEMENT</tspan>
    </text>
  </g>
  <g id="chartArea">
    
    <g id="card-1">
      <path fill="#EEF2F7" d="M78,156 H602 A18,18 0 0 1 620,174 V362 A18,18 0 0 1 602,380 H78 A18,18 0 0 1 60,362 V174 A18,18 0 0 1 78,156 Z" />
      <path d="M245 156 h190 a25 25 0 0 1 25 25 v25 h-240 v-25 a25 25 0 0 1 25 -25 Z" fill="#2F80ED" />
      <text x="340" y="188" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF" text-anchor="middle">
        <tspan>融合权重</tspan>
      </text>
      <path fill="#FFFFFF" d="M94,222 H586 A12,12 0 0 1 598,234 V346 A12,12 0 0 1 586,358 H94 A12,12 0 0 1 82,346 V234 A12,12 0 0 1 94,222 Z" />
      <text x="108" y="264" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" font-weight="800" fill="#1F2937">
        <tspan>最终融合权重不是装饰参数，而是有效优化因子。</tspan>
      </text>
      <text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="16" x="108" y="304"><tspan>从</tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">0.60 / 0.40</tspan><tspan> 调到 </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">0.40 / 0.60</tspan><tspan> 后，</tspan>
        </text><text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="16" x="108" y="330"><tspan>分数从 </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">0.38041</tspan><tspan> 改善到 </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#2F80ED" font-weight="800">0.38015</tspan><tspan> 附近。</tspan>
      </text></g>
    <g id="card-2">
      <path fill="#EEF2F7" d="M678,156 H1202 A18,18 0 0 1 1220,174 V362 A18,18 0 0 1 1202,380 H678 A18,18 0 0 1 660,362 V174 A18,18 0 0 1 678,156 Z" />
      <path d="M845 156 h190 a25 25 0 0 1 25 25 v25 h-240 v-25 a25 25 0 0 1 25 -25 Z" fill="#27AE60" />
      <text x="940" y="188" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF" text-anchor="middle">
        <tspan>长周期滞后</tspan>
      </text>
      <path fill="#FFFFFF" d="M694,222 H1186 A12,12 0 0 1 1198,234 V346 A12,12 0 0 1 1186,358 H694 A12,12 0 0 1 682,346 V234 A12,12 0 0 1 694,222 Z" />
      <text x="708" y="264" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" font-weight="800" fill="#1F2937">
        <tspan>lag 730 与 lag 365 都不能删除。</tspan>
      </text>
      <text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="16" x="708" y="304"><tspan>去掉 </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#27AE60" font-weight="800">730</tspan><tspan> 后退化到 </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#27AE60" font-weight="800">0.38138</tspan><tspan>，</tspan>
        </text><text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="16" x="708" y="330"><tspan>去掉 </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#27AE60" font-weight="800">365</tspan><tspan> 后退化到 </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#27AE60" font-weight="800">0.38074</tspan><tspan>。</tspan>
      </text></g>
    <g id="card-3">
      <path fill="#EEF2F7" d="M78,400 H602 A18,18 0 0 1 620,418 V606 A18,18 0 0 1 602,624 H78 A18,18 0 0 1 60,606 V418 A18,18 0 0 1 78,400 Z" />
      <path d="M245 400 h190 a25 25 0 0 1 25 25 v25 h-240 v-25 a25 25 0 0 1 25 -25 Z" fill="#163B66" />
      <text x="340" y="432" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF" text-anchor="middle">
        <tspan>节假日去噪</tspan>
      </text>
      <path fill="#FFFFFF" d="M94,466 H586 A12,12 0 0 1 598,478 V590 A12,12 0 0 1 586,602 H94 A12,12 0 0 1 82,590 V478 A12,12 0 0 1 94,466 Z" />
      <text x="108" y="508" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" font-weight="800" fill="#1F2937">
        <tspan>节假日特征不是越多越好，存在噪声项。</tspan>
      </text>
      <text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="16" x="108" y="548">从 7 个候选节日缩减为 4 个核心节日后，</text><text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="16" x="108" y="574"><tspan>成绩由 </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#163B66" font-weight="800">0.38015</tspan><tspan> 提升到 </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#163B66" font-weight="800">0.38005</tspan><tspan>。</tspan>
      </text></g>
    <g id="card-4">
      <path fill="#EEF2F7" d="M678,400 H1202 A18,18 0 0 1 1220,418 V606 A18,18 0 0 1 1202,624 H678 A18,18 0 0 1 660,606 V418 A18,18 0 0 1 678,400 Z" />
      <path d="M845 400 h190 a25 25 0 0 1 25 25 v25 h-240 v-25 a25 25 0 0 1 25 -25 Z" fill="#D64545" />
      <text x="940" y="432" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF" text-anchor="middle">
        <tspan>transactions 协变量</tspan>
      </text>
      <path fill="#FFFFFF" d="M694,466 H1186 A12,12 0 0 1 1198,478 V590 A12,12 0 0 1 1186,602 H694 A12,12 0 0 1 682,590 V478 A12,12 0 0 1 694,466 Z" />
      <text x="708" y="508" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" font-weight="800" fill="#1F2937">
        <tspan>过去协变量中的 transactions 仍然有效。</tspan>
      </text>
      <text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="16" x="708" y="548">在 version7.3 基础上移除它之后，</text><text font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" fill="#1F2937" font-size="16" x="708" y="574"><tspan>分数回退到 </tspan><tspan font-family="Consolas, &quot;Courier New&quot;, monospace" fill="#D64545" font-weight="800">0.38110</tspan><tspan>。</tspan>
      </text></g>
  </g>
  <g id="footer">
    <text x="1218" y="656" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="13" fill="#9CA3AF" text-anchor="end">
      <tspan>11</tspan>
    </text>
  </g>
</svg>